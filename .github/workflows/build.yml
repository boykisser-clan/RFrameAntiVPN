name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build
        run: |
          ./gradlew :common:build
          ./gradlew :bungeecord:build

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        id: release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload JAR
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          curl -s -X POST "https://uploads.github.com/repos/${{ github.repository }}/releases/${{ steps.release.outputs.id }}/assets?name=RFrameAntiVPN-BungeeCord-${{ github.ref_name }}.jar" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/java-archive" \
            --data-binary @bungeecord/build/libs/RFrameAntiVPN-1.0.0.jar